<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка IP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .setup-container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #334155;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #60a5fa;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .ip-display {
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-family: monospace;
            text-align: center;
            font-size: 18px;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .btn {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #0da271;
        }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        
        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            display: block;
        }
        
        .error {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid #dc2626;
            color: #f87171;
            display: block;
        }
        
        .info {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <h1>🔧 Настройка доступа по IP</h1>
        
        <div class="ip-display" id="currentIP">
            Определение вашего IP...
        </div>
        
        <div class="controls">
            <button onclick="addMyIP()" class="btn btn-primary">
                ✅ Добавить мой IP в разрешенные
            </button>
            
            <button onclick="allowAllIPs()" class="btn btn-success">
                🌐 Разрешить все IP (отключить проверку)
            </button>
            
            <button onclick="goToLogin()" class="btn">
                🔐 Перейти к входу
            </button>
            
            <button onclick="openAdmin()" class="btn">
                ⚙️ Открыть панель управления
            </button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="info">
            <p><strong>Ваш IP будет добавлен в список:</strong></p>
            <ul style="margin-left: 20px; margin-top: 10px;">
                <li>95.52.37.108</li>
                <li>127.0.0.1 (локальный)</li>
                <li>192.168.1.1 (локальная сеть)</li>
            </ul>
        </div>
    </div>

    <script>
        // Определяем IP пользователя
        async function getUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'unknown';
            }
        }
        
        // Загружаем текущие IP
        function loadAllowedIPs() {
            try {
                const savedIPs = localStorage.getItem('allowed_ips');
                return savedIPs ? JSON.parse(savedIPs) : [];
            } catch (e) {
                return [];
            }
        }
        
        // Сохраняем IP
        function saveAllowedIPs(ips) {
            localStorage.setItem('allowed_ips', JSON.stringify(ips));
        }
        
        // Показываем текущий IP
        async function showCurrentIP() {
            const ip = await getUserIP();
            document.getElementById('currentIP').innerHTML = `
                <strong>Ваш IP:</strong><br>
                <span style="font-size: 24px; color: #60a5fa;">${ip}</span>
            `;
            
            // Проверяем, есть ли уже этот IP в списке
            const allowedIPs = loadAllowedIPs();
            if (allowedIPs.includes(ip)) {
                showStatus(`✅ Ваш IP ${ip} уже в списке разрешенных`, 'success');
            }
        }
        
        // Добавляем IP пользователя
        async function addMyIP() {
            try {
                const userIP = await getUserIP();
                const allowedIPs = loadAllowedIPs();
                
                if (!allowedIPs.includes(userIP)) {
                    allowedIPs.push(userIP);
                    saveAllowedIPs(allowedIPs);
                    showStatus(`✅ IP ${userIP} добавлен в разрешенные!`, 'success');
                } else {
                    showStatus(`ℹ️ IP ${userIP} уже в списке разрешенных`, 'success');
                }
                
                // Также добавляем стандартные IP
                const standardIPs = ['127.0.0.1', '192.168.1.1', 'localhost'];
                standardIPs.forEach(ip => {
                    if (!allowedIPs.includes(ip)) {
                        allowedIPs.push(ip);
                    }
                });
                
                saveAllowedIPs(allowedIPs);
                
                // Обновляем отображение
                setTimeout(showCurrentIP, 500);
                
            } catch (error) {
                showStatus('❌ Ошибка при добавлении IP', 'error');
                console.error(error);
            }
        }
        
        // Разрешаем все IP (отключаем проверку)
        function allowAllIPs() {
            // Пустой массив = разрешить все
            saveAllowedIPs([]);
            showStatus('✅ Проверка по IP отключена. Доступ открыт со всех IP.', 'success');
        }
        
        // Отключаем проверку API-адресов
        function allowAllAPIAddresses() {
            localStorage.setItem('allowed_api_addresses', JSON.stringify([]));
        }
        
        // Переход к входу
        function goToLogin() {
            // Отключаем проверку API-адресов
            allowAllAPIAddresses();
            
            // Переходим к входу
            window.location.href = 'index.html';
        }
        
        // Открываем панель управления
        function openAdmin() {
            window.location.href = 'admin.html';
        }
        
        // Показываем статус
        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            
            // Автоскрытие через 5 секунд
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 5000);
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', async () => {
            await showCurrentIP();
            
            // Автоматически добавляем IP пользователя
            setTimeout(addMyIP, 1000);
            
            // Отключаем проверку API-адресов по умолчанию
            allowAllAPIAddresses();
        });
    </script>
</body>
</html>
