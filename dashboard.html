<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Защищенная зона</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard {
            max-width: 800px;
        }
        
        .welcome {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .card h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .logout-btn {
            background: #ff4757;
            width: 100%;
            margin-top: 20px;
        }
        
        .key-info {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container dashboard">
        <div class="auth-box">
            <div class="welcome">
                <h1>🎉 Добро пожаловать!</h1>
                <p>Вы успешно вошли в защищенную зону</p>
            </div>
            
            <div class="key-info">
                <h3>📋 Ваш API-ключ:</h3>
                <p id="apiKeyDisplay"></p>
            </div>
            
            <div class="content">
                <div class="card">
                    <h3>📊 Статистика</h3>
                    <p>Доступ к статистике вашего аккаунта</p>
                </div>
                
                <div class="card">
                    <h3>⚙️ Настройки</h3>
                    <p>Управление параметрами доступа</p>
                </div>
                
                <div class="card">
                    <h3>📁 Файлы</h3>
                    <p>Доступ к защищенным файлам</p>
                </div>
                
                <div class="card">
                    <h3>🛡️ Безопасность</h3>
                    <p>Настройки безопасности аккаунта</p>
                </div>
            </div>
            
            <button id="logoutBtn" class="logout-btn">Выйти</button>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
